<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="layout.css">
<link rel="stylesheet" href="animations.css">
</head>
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<body>

<div class="bg-gradient"></div>
<div class="cursor-light" id="cursor"></div>

<div class="container">

<!-- NAVBAR -->
<header class="glass navbar">
<h2 class="logo">Shamil</h2>
<nav>
<a href="#work">Work</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<h1>Design That Feels <span>Alive</span></h1>
<p>Modern UI/UX Designer building glowing digital experiences.</p>
<button class="btn">View Projects</button>
</section>

<!-- FEATURE GRID (LIKE YOUR IMAGE STYLE) -->
<section class="grid">

<div class="glass card big">
<img src="https://images.unsplash.com/photo-1559027615-cd4628902d4a">
<h3>Dashboard UI</h3>
</div>

<div class="glass card">
<img src="https://images.unsplash.com/photo-1547658719-da2b51169166">
<h3>Mobile App</h3>
</div>

<div class="glass card">
<img src="https://images.unsplash.com/photo-1522199710521-72d69614c702">
<h3>Web Design</h3>
</div>

<div class="glass card wide">
<img src="https://images.unsplash.com/photo-1558655146-9f40138edfeb">
<h3>Brand Identity</h3>
</div>

</section>

<!-- PRICING STYLE SECTION -->
<section class="pricing">
<h2>Plans</h2>

<div class="pricing-grid">

<div class="glass price-card">
<h3>Starter</h3>
<p>$250</p>
<button class="btn">Choose</button>
</div>

<div class="glass price-card highlight">
<h3>Pro</h3>
<p>$700</p>
<button class="btn">Choose</button>
</div>

<div class="glass price-card">
<h3>Growth</h3>
<p>$450</p>
<button class="btn">Choose</button>
</div>

</div>
</section>

<!-- CONTACT -->
<section class="contact glass">
<h2>Contact Me</h2>
<input type="text" placeholder="Your Name">
<input type="email" placeholder="Email">
<textarea placeholder="Message"></textarea>
<button class="btn">Send</button>
</section>

</div>

<script src="script.js"></script>
<script src="effects.js"></script>
</body> 
</html>
